<!DOCTYPE html>
<html>
<head>
  <title>Aruvi Test Barcode</title>
  <style>
    body {
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
    }
    h2 { color: #EB1C24; margin-bottom: 10px; }
    p { color: #555; font-size: 13px; margin: 4px 0; }
    .barcode-container {
      background: white;
      padding: 24px 32px;
      border: 2px solid #eee;
      border-radius: 12px;
      margin: 20px;
    }
    canvas { display: block; }
    .info { margin-top: 8px; font-size: 11px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h2>🎵 Aruvi Test Barcode</h2>
  <p>Screenshot this barcode and use <strong>"Scan from Gallery"</strong> in the app to test.</p>
  <div class="barcode-container">
    <canvas id="barcodeCanvas" width="400" height="100"></canvas>
    <div class="info">aruvi://playlist/1</div>
  </div>
  <p>This is a real Code 128 barcode encoding: <code>aruvi://playlist/1</code></p>

  <script>
    // Code 128 implementation (subset B)
    const CODE128_B = {
      chars: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~",
      patterns: [
        "11011001100","11001101100","11001100110","10010011000","10010001100",
        "10001001100","10011001000","10011000100","10001100100","11001001000",
        "11001000100","11000100100","10110011100","10011011100","10011001110",
        "10111001100","10011101100","10011100110","11001110010","11001011100",
        "11001001110","11011100100","11001110100","11101101110","11101001100",
        "11100101100","11100100110","11101100100","11100110100","11100110010",
        "11011011000","11011000110","11000110110","10100011000","10001011000",
        "10001000110","10110001000","10001101000","10001100010","11010001000",
        "11000101000","11000100010","10110111000","10110001110","10001101110",
        "10111011000","10111000110","10001110110","11101110110","11010001110",
        "11000101110","11011101000","11011100010","11011101110","11101011000",
        "11101000110","11100010110","11101101000","11101100010","11100011010",
        "11101111010","11001000010","11110001010","10100110000","10100001100",
        "10010110000","10010000110","10000101100","10000100110","10110010000",
        "10110000100","10011010000","10011000010","10000110100","10000110010",
        "11000010010","11001010000","11110111010","11000010100","10001111010",
        "10100111100","10010111100","10010011110","10111100100","10011110100",
        "10011110010","11110100100","11110010100","11110010010","11011011110",
        "11011110110","11110110110","10101111000","10100011110","10001011110",
        "10111101000","10111100010","11110101000","11110100010","10111011110",
        "10111101110","11101011110","11110101110","11010000100","11010010000",
        "11010011100","11000111010","11"
      ]
    };

    function encodeCode128B(text) {
      const START_B = 104;
      const STOP = 106;
      
      let checksum = START_B;
      let bars = CODE128_B.patterns[START_B];
      
      for (let i = 0; i < text.length; i++) {
        const charIndex = CODE128_B.chars.indexOf(text[i]);
        if (charIndex === -1) continue;
        const codeIndex = charIndex + 32; // Code 128 B offset
        checksum += (i + 1) * codeIndex;
        bars += CODE128_B.patterns[codeIndex];
      }
      
      checksum = checksum % 103;
      bars += CODE128_B.patterns[checksum];
      bars += CODE128_B.patterns[STOP];
      bars += "11"; // End bar
      
      return bars;
    }

    function drawBarcode(canvasId, text) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;
      
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, W, H);

      // Encode text
      const START_CODE = 104; // Start B
      const STOP_CODE = 106;
      let codes = [START_CODE];
      let checksum = START_CODE;
      
      for (let i = 0; i < text.length; i++) {
        const charIdx = text.charCodeAt(i) - 32; // Code B: space=0, etc.
        codes.push(charIdx);
        checksum += (i + 1) * charIdx;
      }
      codes.push(checksum % 103);
      codes.push(STOP_CODE);

      // Build binary bar string
      let barString = '';
      for (const code of codes) {
        barString += CODE128_B.patterns[code];
      }
      barString += '11'; // End bar

      const totalModules = barString.length;
      const moduleWidth = W / totalModules;
      
      ctx.fillStyle = 'black';
      
      for (let i = 0; i < barString.length; i++) {
        if (barString[i] === '1') {
          ctx.fillRect(Math.floor(i * moduleWidth), 0, Math.ceil(moduleWidth), H);
        }
      }
    }

    window.onload = () => {
      drawBarcode('barcodeCanvas', 'aruvi://playlist/1');
    };
  </script>
</body>
</html>
